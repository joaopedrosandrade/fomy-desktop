name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Configurar autenticação de update (repo privado)
        env:
          GH_UPDATE_TOKEN: ${{ secrets.GH_UPDATE_TOKEN }}
          GITHUB_REPO_PRIVATE: 'true'
        run: node scripts/prepare-update-config.js

      - name: Build e publicar no GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
