name: Auto Tag

# Cria automaticamente a tag v{versão} a cada push no master.
# A tag dispara o workflow "Release" que publica o instalador.

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ler versão do package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Criar e publicar tag
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe — nenhuma ação necessária."
            echo "Para publicar nova versão, incremente 'version' em package.json antes do push."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag $TAG criada e publicada."
